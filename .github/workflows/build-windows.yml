name: Build Windows Installer

# Triggers:
#   - Tag push (v*.*.*)        → builds + creates GitHub Release with .exe attached
#   - Manual dispatch          → builds artifact only (downloadable from Actions tab)
#   - Push to master/main      → builds artifact only (continuous validation)
on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Cancel duplicate runs on the same ref to save minutes.
concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed to create releases and push to release-windows branch

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-build.txt

      - name: Install Python build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-build.txt

      - name: Build backend.exe (PyInstaller)
        run: python backend/build_exe.py

      - name: Cache root npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-root-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: npm-root-

      - name: Cache frontend npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-frontend-${{ hashFiles('frontend/package-lock.json', 'frontend/package.json') }}
          restore-keys: npm-frontend-

      - name: Cache electron-builder downloads
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/electron-builder/Cache
          key: electron-builder-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: electron-builder-${{ runner.os }}-

      - name: Install root Electron deps
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Install frontend deps
        run: npm install --prefix frontend --no-audit --no-fund --legacy-peer-deps

      - name: Build frontend (Vite)
        run: npm --prefix frontend run build

      - name: Stage app-files for electron-builder
        run: node scripts/stage-app-files.cjs

      - name: Build NSIS installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CSC_LINK / CSC_KEY_PASSWORD: set as repo secrets when you obtain
          # a code-signing certificate. Builds run unsigned without them.
        run: npx electron-builder --win --x64 --publish never

      - name: Build app-files SHA-256 manifest
        # Used by the in-app updater for file-level (not just version-level)
        # diffing. Uploaded as a release asset alongside the .exe so the
        # client can compare its installed files to the canonical release.
        run: node scripts/build-manifest.cjs

      - name: Build frontend hot-update archive
        # Bundles only the frontend (HTML/JS/CSS) into frontend-dist.tar.gz.
        # When a release ships frontend-only changes, the desktop client
        # can hot-patch by downloading this small archive instead of the
        # full installer — no UAC, no restart, no re-download of backend.exe.
        run: node scripts/build-frontend-archive.cjs

      - name: Show build artifacts
        shell: bash
        run: |
          ls -lah release/ || echo "(no release dir)"
          echo "--- artifacts ---"
          find release -maxdepth 2 -type f \( -name "*.exe" -o -name "*.blockmap" -o -name "*.yml" -o -name "*.json" -o -name "*.tar.gz" \) 2>/dev/null

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hanouti-windows-installer-${{ github.sha }}
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
            release/manifest.json
            release/frontend-dist.tar.gz
          retention-days: 30
          if-no-files-found: error

      - name: Stage release artifacts on release-windows branch
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config --global user.email "actions@github.com"
          git config --global user.name "Hanouti Release Bot"
          git fetch origin release-windows:release-windows 2>/dev/null || git checkout --orphan release-windows
          git checkout release-windows 2>/dev/null || git checkout --orphan release-windows
          git rm -rf . 2>/dev/null || true
          mkdir -p frontend-dist backend-dist
          cp -r app-files/frontend-dist/* frontend-dist/
          cp -r app-files/backend-dist/* backend-dist/
          echo "# Hanouti — Release Artifacts" > README.md
          echo "" >> README.md
          echo "Auto-published from tag \`${{ github.ref_name }}\`." >> README.md
          echo "Used by the in-app updater to fetch fresh frontend & backend files." >> README.md
          git add -A
          git commit -m "release: ${{ github.ref_name }}"
          git push -f origin release-windows

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Hanouti ${{ github.ref_name }}
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
            release/manifest.json
            release/frontend-dist.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## ⚡ Hanouti ${{ github.ref_name }} — Windows Installer

            ### 📥 التحميل (Download)

            **[⬇️ Hanouti-Setup-x64.exe](https://github.com/khalilkorichi/hanouti/releases/download/${{ github.ref_name }}/Hanouti-Setup-${{ github.ref_name }}-x64.exe)** — مثبّت Windows x64

            ### 🚀 التثبيت (Install)
            1. حمّل الملف أعلاه
            2. شغّله واتبع المعالج (العربية مفعّلة افتراضياً)
            3. افتح "Hanouti" من قائمة ابدأ

            > أوّل تشغيل: قد يظهر تحذير SmartScreen — اضغط "المزيد من المعلومات" → "تشغيل على أي حال".

            ### 🔄 التحديث التلقائي
            النسخ المثبّتة سابقاً ستكتشف هذا الإصدار تلقائياً وتعرض إشعاراً.
            يمكن تطبيقه من **الإعدادات → التحديثات**.
